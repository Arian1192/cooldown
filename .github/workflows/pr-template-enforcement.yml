name: PR Template Enforcement

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr-body:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required PR template sections
        uses: actions/github-script@v7
        with:
          script: |
            const core = require('@actions/core');
            const body = context.payload.pull_request?.body || '';

            const requiredSections = [
              'Summary',
              'Scope',
              'Verification',
              'Risks',
              'Checklist'
            ];

            const missingSections = requiredSections.filter((section) => {
              const pattern = new RegExp(`^##\\s+${section}\\s*$`, 'mi');
              return !pattern.test(body);
            });

            const requiredCheckedItems = [
              'PR body is complete (no placeholders left).',
              'Verification section includes executed checks.',
              'Scope section explains changed vs out-of-scope items.',
              'If this closes a technical issue, closing comment will include PR link, verification summary, and scope summary.'
            ];

            const checkedItems = [];
            const checkboxRegex = /^- \[(x|X)\] (.+)$/gmi;
            let match;
            while ((match = checkboxRegex.exec(body)) !== null) {
              checkedItems.push(match[2].trim());
            }

            const uncheckedRequired = requiredCheckedItems.filter((item) => !checkedItems.includes(item));

            const placeholderPatterns = [
              /describe the change in 2-5 lines\./i,
              /what was changed:/i,
              /checks run:/i,
              /risk level:/i,
              /rollback plan:/i
            ];

            const foundPlaceholders = placeholderPatterns.some((pattern) => pattern.test(body));

            const errors = [];

            if (missingSections.length > 0) {
              errors.push(`Missing required sections: ${missingSections.join(', ')}`);
            }

            if (uncheckedRequired.length > 0) {
              errors.push(`Required checklist items not checked: ${uncheckedRequired.join(' | ')}`);
            }

            if (foundPlaceholders) {
              errors.push('PR body still contains template placeholder text.');
            }

            if (!body.trim()) {
              errors.push('PR description is empty.');
            }

            if (errors.length > 0) {
              core.setFailed(`PR template validation failed. ${errors.join(' ')}`);
            } else {
              core.info('PR template validation passed.');
            }
