<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-label="Urban cover placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0d12" />
      <stop offset="1" stop-color="#141a24" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#ff2d55" />
      <stop offset="1" stop-color="#00d4ff" />
    </linearGradient>
    <filter id="noise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.2  0 0 0 0 0.2  0 0 0 0 0.2  0 0 0 0.12 0"/>
    </filter>
  </defs>

  <rect width="1200" height="750" fill="url(#bg)" />

  <!-- grid -->
  <g opacity="0.16" stroke="#ffffff" stroke-width="1">
    <path d="M0 120H1200" />
    <path d="M0 240H1200" />
    <path d="M0 360H1200" />
    <path d="M0 480H1200" />
    <path d="M0 600H1200" />
    <path d="M200 0V750" />
    <path d="M400 0V750" />
    <path d="M600 0V750" />
    <path d="M800 0V750" />
    <path d="M1000 0V750" />
  </g>

  <!-- accent blocks -->
  <g opacity="0.9">
    <rect x="80" y="520" width="460" height="32" fill="url(#accent)" />
    <rect x="80" y="570" width="360" height="20" fill="#ffffff" opacity="0.10" />
    <rect x="80" y="605" width="260" height="16" fill="#ffffff" opacity="0.08" />
  </g>

  <!-- noisy layer -->
  <rect width="1200" height="750" filter="url(#noise)" opacity="0.6" />

  <!-- tiny mark -->
  <g transform="translate(80 120)" opacity="0.9">
    <circle cx="10" cy="10" r="10" fill="#ff2d55" />
    <circle cx="40" cy="10" r="10" fill="#00d4ff" opacity="0.85" />
  </g>
</svg>
